# render.yaml — Render static site deployment configuration
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: biswajit-portfolio
    env: static
    plan: free
    repo: https://github.com/<YOUR_GITHUB_USERNAME>/portfolio-biswajit   # ← replace with your repo URL
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # SPA fallback — all paths serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
